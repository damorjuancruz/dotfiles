#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[default_session]
preview_command = "eza --all --icons --color=always {}"

[[wildcard]]
pattern = "~/code/*"
startup_command = "exec nvim"
windows = ["opencode", "zsh"]

[[wildcard]]
pattern = "~/dotfiles"
startup_command = "exec nvim"
windows = ["zsh"]

[[wildcard]]
pattern = "~/documents/notes"
startup_command = "exec nvim"

[[window]]
name = "opencode"
startup_script = "exec opencode"

[[window]]
name = "zsh"
startup_script = "clear"
